name: Weekly Content Monitor

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC (4:00 AM Central)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 markdownify pyyaml certifi mkdocs-material mkdocs-glightbox

      - name: Run content monitor (dry-run)
        run: |
          python scripts/monitor_updates.py --all --dry-run

      - name: Build check
        run: |
          mkdocs build 2>&1 | tail -20

      - name: External link check (docs)
        run: |
          python scripts/check_external_links.py --write-report "reports/external-link-check-$(date +%Y-%m-%d).md"

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit report
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "divi-docs-bot"
          git config user.email "bot@16wells.com"
          git add reports/ scripts/et_content_hashes.json scripts/check_external_links.py scripts/external_link_allowlist.txt
          git diff --cached --quiet || git commit -m "Weekly monitor report: $(date +%Y-%m-%d)"
          git push
