name: Deploy Divi Docs

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild daily at 6:00 AM UTC to expire stale NEW badges
    - cron: '0 6 * * *'

permissions:
  contents: write

# Prevent parallel gh-pages pushes when multiple commits land in quick succession.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-glightbox

      - name: Build and deploy
        run: mkdocs gh-deploy --force
