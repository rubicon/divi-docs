site_name: Divi 5 Technical Documentation
site_description: Community-maintained technical documentation for Divi 5 by Elegant Themes
site_url: https://16wells.github.io/divi-docs/
repo_url: https://github.com/16wells/divi-docs
repo_name: 16wells/divi-docs
edit_uri: edit/main/docs/

hooks:
  - hooks/new_badge.py

extra_css:
  - stylesheets/new-badge.css

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  custom_dir: overrides

plugins:
  - search
  - tags
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  analytics:
    provider: google
    property: G-V3L5RFWQX2
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/16wells/divi-docs
  generator: false  
  status:
    new: "Recently added or updated"

